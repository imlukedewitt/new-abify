services:
  app:
    build: .
    command: bundle exec rails server -b 0.0.0.0 -p 10000
    ports:
      - "10000:10000"
    volumes:
      - .:/rails
    environment:
      - RAILS_ENV=development

  css:
    build: .
    entrypoint: []
    command: bundle exec rails tailwindcss:watch[always]
    volumes:
      - .:/rails
    environment:
      - RAILS_ENV=development
